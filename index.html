<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#071226" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="SpriteDex" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>SpriteDex</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Fortnite Companion</p>
        <h1>SpriteDex</h1>
        <p class="sub">Track owned + mastered sprites on your iPhone.</p>
      </div>
      <button id="resetBtn" class="ghost">Reset</button>
    </header>

    <section class="dash">
      <article>
        <strong id="ownedPct">0%</strong>
        <span>Owned</span>
        <div class="bar"><i id="ownedBar"></i></div>
        <small id="ownedCount">0 / 0</small>
      </article>
      <article>
        <strong id="masteredPct">0%</strong>
        <span>Mastered</span>
        <div class="bar"><i id="masteredBar"></i></div>
        <small id="masteredCount">0 / 0</small>
      </article>
    </section>

    <section class="controls">
      <input id="searchInput" type="search" placeholder="Search Water, Gold, Grim..." />
      <div class="chips" id="variantChips"></div>
      <select id="filterSelect">
        <option value="all">All sprites</option>
        <option value="missing">Missing only</option>
        <option value="owned">Owned only</option>
        <option value="mastered">Mastered only</option>
      </select>
    </section>

    <main id="grid" class="grid"></main>

    <footer>
      Progress is saved only in this browser using local storage. Images load from Fortnite.GG.
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
